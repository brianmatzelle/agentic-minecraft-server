# Modded Minecraft — NeoForge 1.21.x — itzg/minecraft-server
# Layer 1 of the architecture (the actual game server). This is a NORMAL
# container exposed on TCP 25565 — it does NOT run inside OpenShell (OpenShell
# is egress-only and cannot host an inbound game listener). See docs/architecture.md.
#
# Quickstart:  cp .env.example .env  &&  edit .env  &&  docker compose up -d
# Custom seed: set LEVEL_SEED in .env (only takes effect on first world gen).
# Console:     docker compose exec minecraft rcon-cli   (or: mc-send-to-console)

services:
  minecraft:
    image: itzg/minecraft-server:java21
    container_name: mc-neoforge
    tty: true
    stdin_open: true
    restart: unless-stopped
    stop_grace_period: 120s                    # give the modded server up to 2m to save+shut down on stop/reboot (default is 10s)
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"                              # accepts https://aka.ms/MinecraftEULA
      TYPE: "NEOFORGE"
      VERSION: "${MC_VERSION:-1.21.1}"          # NeoForge build auto-resolved for this MC version
      MEMORY: "${MC_MEMORY:-12G}"               # heap; Aikar flags set Xms=Xmx. 12G is a healthy modded heap on this 128G box (bigger ≠ better — large heaps lengthen GC pauses)
      SEED: "${LEVEL_SEED:-}"                   # <-- custom world seed (blank = random)
      MOTD: "${MC_MOTD:-A NeoForge server, maintained by Garvis}"
      DIFFICULTY: "${MC_DIFFICULTY:-normal}"
      MAX_PLAYERS: "${MC_MAX_PLAYERS:-20}"
      # --- Render / simulation distance (applied to server.properties; OVERRIDE_SERVER_PROPERTIES re-applies on restart) ---
      # view-distance = chunks of terrain SENT to clients (what you see). Cheap-ish; max 32.
      # simulation-distance = chunks that actually TICK (entities/mob-spawning/redstone/crops).
      #   This is the TPS-sensitive one and is single-thread-CPU-bound, NOT RAM-bound — more
      #   heap does not raise its ceiling. Lowered 20 -> 12 (2026-06-25) in response to player
      #   reports of server lag: fewer ticking chunks per player directly relieves the
      #   single-thread tick budget, the usual cause of slowness on an entity-heavy modded
      #   server (Cobblemon). 12 still beats vanilla's 10. Profile with `spark` to confirm the
      #   real bottleneck before tuning further (raise back toward 20 if TPS has headroom).
      # view-distance lowered 32 -> 16 at the same time: trims terrain chunks loaded/sent
      #   (memory + chunk-gen + network), still a generous render range well above vanilla 10.
      VIEW_DISTANCE: "${MC_VIEW_DISTANCE:-16}"
      SIMULATION_DISTANCE: "${MC_SIMULATION_DISTANCE:-12}"
      OPS: "${MC_OPS:-}"                        # server operators (admin) — set via MC_OPS in .env
      OVERRIDE_OPS: "TRUE"                       # rewrite ops.json from MC_OPS each start (repo is source of truth; wipes any drift / console-granted op)
      # --- Whitelist (only listed players may join) ---
      WHITELIST: "${MC_WHITELIST:-}"            # comma-separated usernames; setting this turns white-list on
      ENFORCE_WHITELIST: "TRUE"                 # kick players who get removed from the list, even mid-session
      OVERRIDE_WHITELIST: "TRUE"                # rewrite whitelist.json from MC_WHITELIST each start (repo is source of truth)
      # --- Mods from Modrinth (auto-downloaded at startup) ---
      MODRINTH_PROJECTS: "${MODRINTH_PROJECTS:-}"
      MODRINTH_DOWNLOAD_DEPENDENCIES: "required"
      # Some mods publish their STABLE builds on Modrinth's "alpha"/"beta" release
      # channel (CC: Tweaked is the classic case — all its uploads are channel=alpha).
      # itzg defaults to release-only and would reject them, so accept alpha+ here.
      # itzg still selects the newest version COMPATIBLE with this MC + loader.
      MODRINTH_ALLOWED_VERSION_TYPE: "${MODRINTH_ALLOWED_VERSION_TYPE:-alpha}"
      # --- Optional CurseForge modpack ---
      # AUTO_CURSEFORGE: "true"
      # CF_API_KEY: "${CF_API_KEY:-}"
      USE_AIKAR_FLAGS: "true"                   # GC tuning recommended for modded
      OVERRIDE_SERVER_PROPERTIES: "true"        # re-apply env-driven props on restart
    volumes:
      - ./server-data:/data                     # world + mods + logs (gitignored)
